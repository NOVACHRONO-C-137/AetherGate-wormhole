[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
]

[rpc_endpoints]
mainnet     = "${RPC_MAINNET}"
sepolia     = "${RPC_SEPOLIA}"
polygon     = "${RPC_POLYGON}"
arbitrum    = "${RPC_ARBITRUM}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }

[fmt]
line_length     = 120
tab_width       = 4
bracket_spacing = true
